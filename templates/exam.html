<!-- templates/exams.html -->

<!DOCTYPE html>
<html>

<head>
<title>Exam Dashboard</title>
</head>

<body>

<h2>Student Exams</h2>

<form>

<input type="text"
       name="name"
       placeholder="Student Name">

<input type="text"
       name="username"
       placeholder="Enrollment No">

<input type="date"
       name="exam_date">

<button>
Search
</button>

</form>

<br>

<select id="examFilter">

<option value="">
All Exams
</option>

{% for exam in exams %}
<option>
{{ exam.subject }}
</option>
{% endfor %}

</select>

<table border="1">

<tr>
<th>Name</th>
<th>Enrollment</th>
<th>Subject</th>
<th>Exam Date</th>
<th>Token</th>
<th>Student ID</th>
<th>Exam ID</th>
<th>Question ID</th>
</tr>

{% for row in data %}
<tr>

<td>{{ row.name }}</td>
<td>{{ row.username }}</td>
<td>{{ row.subject }}</td>
<td>{{ row.exam_date }}</td>

<td>{{ row.bearer_token }}</td>
<td>{{ row.student_id }}</td>
<td>{{ row.exam_id }}</td>
<td>{{ row.question_id }}</td>

</tr>

{% endfor %}

</table>

</body>
</html>
