
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Upload Student Excel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
:root{
    --primary:#4f46e5;
    --secondary:#2563eb;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#eef4ff,#f8fbff);
    font-family:'Segoe UI',sans-serif;
}

.upload-wrapper{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:30px 15px;
}

.upload-card{
    border:none;
    border-radius:24px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.upload-header{
    background:linear-gradient(135deg,var(--primary),var(--secondary));
    color:white;
    padding:25px;
}

.upload-header h2{
    font-weight:700;
    margin:0;
}

.upload-header p{
    margin-top:8px;
    opacity:.9;
}

.form-control{
    border-radius:14px;
    padding:12px;
}

.form-control:focus{
    box-shadow:0 0 0 .2rem rgba(79,70,229,.15);
    border-color:var(--primary);
}

.btn-upload{
    background:linear-gradient(135deg,var(--primary),var(--secondary));
    border:none;
    color:white;
    font-weight:600;
    border-radius:12px;
    padding:12px;
}

.btn-upload:hover{
    color:white;
}

.btn-dashboard{
    border-radius:12px;
    padding:12px;
    font-weight:600;
}

.format-card{
    border:none;
    border-radius:20px;
    box-shadow:0 8px 25px rgba(0,0,0,.05);
}

pre{
    background:#0f172a;
    color:#f8fafc;
    padding:15px;
    border-radius:12px;
    margin:0;
}

.upload-icon{
    font-size:60px;
    color:white;
}

@media(max-width:768px){
    .upload-header{
        text-align:center;
    }
}
</style>

</head>

<body>

<div class="upload-wrapper">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-7">

                <div class="card upload-card">

                    <div class="upload-header text-center">

                        <i class="bi bi-file-earmark-excel-fill upload-icon"></i>

                        <h2 class="mt-3">
                            Upload Student Excel
                        </h2>

                        <p>
                            Upload an Excel sheet containing student credentials
                        </p>

                    </div>

                    <div class="card-body p-4">

                        <form
                            action="/upload"
                            method="post"
                            enctype="multipart/form-data">

                            <div class="mb-4">

                                <label class="form-label fw-semibold">
                                    Excel File
                                </label>

                                <input
                                    type="file"
                                    class="form-control"
                                    name="file"
                                    accept=".xlsx,.xls"
                                    required>

                                <div class="form-text">
                                    Supported formats: .xlsx, .xls
                                </div>

                            </div>

                            <div class="row g-3">

                                <div class="col-md-6">

                                    <button
                                        type="submit"
                                        class="btn btn-upload w-100">

                                        <i class="bi bi-cloud-upload-fill me-2"></i>

                                        Upload & Process

                                    </button>

                                </div>

                                <div class="col-md-6">

                                    <a
                                        href="/dashboard"
                                        class="btn btn-outline-primary btn-dashboard w-100">

                                        <i class="bi bi-speedometer2 me-2"></i>

                                        Dashboard

                                    </a>

                                </div>

                            </div>

                        </form>

                    </div>

                </div>

                <div class="card format-card mt-4">

                    <div class="card-body">

                        <h5 class="fw-bold mb-3">

                            <i class="bi bi-table me-2"></i>

                            Required Excel Format

                        </h5>

                        <pre>
username,password

EN001,123456
EN002,123456
EN003,123456
                        </pre>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
